<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>js의 대화상자 관련 함수</h2>
    <script>
        let irum = '홍길동';
        let tel = '111-1111';
        alert('이름은' + irum + '\n전화는' + tel) //메세지창 띄우기
        console.log('이름은' + irum + '\n전화는' + tel) //검사-콘솔에 로그남기기

        document.write("<br>alert 함수 수행 후 계속");

        let result = confirm("계속 할까요?") // 선택창
        document.write("<br>선택한 값은" + result); //확인 누르면 true, 취소 누르면 false

        let juso = prompt("사는 곳을 입력", "서울역")
        document.write("<br>사는 곳은" + juso);
    </script>
</body>
</html>
