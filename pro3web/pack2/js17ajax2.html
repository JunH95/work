<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        window.onload = () => {
            document.querySelector("#btn1").onclick = funcJson; //getFunc는 실행한다는 뜻, getFunc()는 실행 결과를 넘김
            document.querySelector("#btn2").onclick = funcCsv;
        }
        function funcJson(){
            let xhr = new XMLHttpRequest();
            xhr.open("GET", "sangpum.json", true);
            xhr.onreadystatechange = function(){
                if(xhr.readyState === 4 && xhr.status === 200){
                    let data = JSON.parse(xhr.responseText); // json모양의 문자열을 json객체로 만들어준다는 의미
                    let output = "JSON반환 결과<br>";
                    output += "코드&nbsp;&nbsp;&nbsp;품명<br>";
                    for(let i=0; i < data.length; i++){
                        output += data[i].code + "&nbsp;&nbsp;&nbsp;" + data[i].sang + "<br>"
                    }
                    document.querySelector("#result").innerHTML = output; //output에 tag가 들어있어서 innertext가 아닌 innerhtml
                }
                else{
                    document.querySelector("#result").innerHTML = "로딩실패 : " + xhr.status;
                }
            }
            xhr.send();
        }
        function funcCsv(){
            let xhr = new XMLHttpRequest()
            xhr.open("GET", "sangpum.csv", true);
            xhr.onreadystatechange = function(){
                if(xhr.readyState === 4 && xhr.status === 200){
                    let text = xhr.responseText.trim()
                    let lines = text.split("\n");
                    let output = "csv반환 결과<br>";

                    for(let i=0;i<lines.length;i++){
                        if(lines[i] !== ""){
                            let parts = lines[i].split(",");
                            let code = parts[0].trim();
                            let sang = parts[1].trim();
                            output += "코드는 " + code + ", 상품명은 " + sang + "<br>";
                        }
                    }
                    document.querySelector("#result").innerHTML = output;
                }
            }
            xhr.send();
        }
    </script>
</head>
<body>
    <h3>전통 AJAX 처리</h3>
    <button id="btn1">JSON 불러오기</button>
    <button id="btn2">CSV 불러오기</button>
    <hr>
    <div id="result"></div>
</body>
</html>
