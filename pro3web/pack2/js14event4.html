<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        //window.onload = function(){};
        window.onload = () => {
            //alert("AAA")
            document.getElementById("colorW").onclick = function(){
                document.bgColor = "white";
            }

            document.getElementById("colorG").onclick = () => {
                document.bgColor = "#00ff00"; // = 0f0
            }

            document.getElementById("colorR").onclick = () => {
                document.bgColor = "rgb(100%, 0%, 0%)"; // = rgb(100%, 0%, 0%)
            }

            document.querySelector("#colorB").onclick= () => {
                document.bgColor = "rgb(0,0,900)";
            }

            document.querySelector(".hello").onclick= () => {
                document.querySelector("#show").innerText = "안녕하세요";
            }

            document.querySelector("#calc").ondblclick= () => {
                let ss = `연산 결과는 ${10 + 20}`;
                document.querySelector("#show").innerText=ss;
            }

            document.querySelector("#name").onmouseover= () => {
                document.querySelector("#show").innerHTML="<h2>난 홍길동</h2>";
            }

            document.querySelector("#name").onmouseout= () => {
                document.querySelector("#show").innerHTML="";
            }

            //a tag : click이벤트가 기본 장착됨.
            document.querySelector("#daum").onclick=function(event){
                event.preventDefault(); //해당 tag의 고유 기능 삭제
                console.log(event)
                document.title="새로운 제목"
            }

            // select
            const sdata = document.querySelector("#sel")
            /*sdata.onclick = function(){ //항목을 선택할 때마다 event발생
                document.querySelector("#show").innerHTML = sdata.value; 
            }*/
            sdata.onchange = function(){ //항목이 바뀌면 이벤트 발생
                document.querySelector("#show").innerHTML = sdata.value;
            }
        }
    </script>
</head>
<body>
    * 여러 이벤트 경험하기 * <br/>
    <input type="button" value="흰색" id="colorW">
    <input type="button" value="청색" id="colorB">
    <!--    <input type="button" value="녹색" id="colorG">
            <input type="button" value="적색" id="colorR"> -->

    <span id="colorG">녹색</span>
    <b id="colorR" style="border : 3px solid black; cursor: pointer;">적색</b>
    <hr>
    이벤트 종류<br>
    <button id = "hello" class="hello">인사하기(click)</button>
    <button id = "calc">계산하기(dbclick)</button>
    <button id = "name">이름알기(mouseover)</button>
    <br>
    <hr>
    <a href="https://m.daum.net" id="daum">앵커 tag 클릭</a>
    <br>
    <select id="sel">
        <option value="프로그래머">프로그래머</option>
        <option value="웹퍼블리셔">웹퍼블리셔</option>
        <option value="프로게이머">프로게이머</option>
    </select>
    <hr>
    <div id="show">출력장소</div>
</body>
</html>
