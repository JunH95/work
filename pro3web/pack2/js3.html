<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    조건 판단문 : if<br>
    <script>
        //let ave = prompt("평균 점수 입력 : ", "80");
        //document.write("ave : ", ave);
        let ave = 80;
        if(ave >= 90) 
            document.write("점수 : "+ ave + "이므로 <b style='color : aqua'>우수</b>");
        else if(ave>=70) { // 수행할 문장이 복수개인 경우 중괄호 안에 적는다.
            document.write("점수 : "+ ave + "이므로 <b style='color : blue'>보통</b><br>");
            document.write("&nbsp;&nbsp;와우");
        }
        else
            document.write("점수 : "+ ave + "이므로 <b style='color : red '>저조</b>");
    </script>
<hr>
조건 판단문 : switch<br>
<script>
    let result="B" // 학점 기억 변수

    switch(result){
        case "A": {
            document.write("매우 우수");
            document.write("very good");
            break
        }
        case "B": document.write("우수"); break;
        case "C": document.write("보통"); break;
        // case "D": document.write("저조"); break;
        case "D":
        case "F": document.write("ㄲㅈ"); break;
        default: document.write("기타");
    }
</script>
</body>
</html>
