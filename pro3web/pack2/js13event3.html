<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function func1(){
            // alert("a"); // 연결 확인용 알림창
            document.getElementById("show").innerHTML = "전통적인 이벤트 처리"
        }

        let a = 10;
        let b = {
            funcNew1 : function(){
                document.getElementById("show").innerHTML = "b객체의 메소드 처리"
            },
            funcNew2 : function(){
                document.getElementById("show").innerHTML = "<h1>b 객체의 멤버 수행</h1>"
            },
        }
    </script>

    <script>
        window.onload = function(){ //서버로부터 문서 수신이 완료되면 함수(load이벤트) 수행함.(1회용, 초기화 담당, callback함수)
            // alert("ok")
            const exBtn1 = document.getElementById("btn1"); //특정 버튼을 읽어 변수에 기억
            exBtn1.onclick = function(){ // 이벤트 장착
                document.getElementById("show").innerHTML = "클릭1 선택"
            }

            const exBtn2 = document.getElementsByName("myBtn"); // 배열에 기억
            console.log(exBtn2.length); //exBtn2는 array
            exBtn2[0].onclick = function(){ // 이벤트 장착
                document.getElementById("show").innerHTML = "클릭2 선택"
            }
            exBtn2[1].onclick = function(){ // 이벤트 장착
                document.getElementById("show").innerHTML = "<i>클릭3 선택</i>"
            }

            const exBtn4 = document.getElementsByTagName("button")[3];
            exBtn4.onclick = function(){
                document.getElementById("show").innerHTML = "<b>클릭4 선택</b>"
            }

            //이벤트 연결 및 해제
            // addEventListener("이벤트 종류", 핸들러함수)
            document.getElementById("btn5").addEventListener("click", abcFunc); // 이벤트 연결
        }

        function abcFunc(){
            // alert("abc");
            document.getElementById("show").innerHTML = "클릭5 선택";

            document.getElementById("btn5").removeEventListener("click", abcFunc); //이벤트 해제
        }
    </script>
</head>
<body>
    <h2>이벤트 처리 : 이벤트 핸들러 연결</h2>
    <input type="button" value="버튼1" onclick="func1()"><br>
    <input type="button" value="버튼2" onclick="b.funcNew1()"><br>
    <input type="button" value="버튼3" onclick="b.funcNew2()"><br>
    <hr>
    <button id="btn1">클릭1</button><br>
    <!-- <button id="btn1" onclick="이벤트처리 함수()">클릭1</button><br> -->
    <button id="btn2" name="myBtn">클릭2</button><br>
    <button id="btn3" name="myBtn">클릭3</button><br>
    <button id="btn4">클릭4</button><br>
    <button id="btn5">클릭5</button><br>

    <div id="show"></div>
</body>
</html>
