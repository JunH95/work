<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Document</title>
</head>
<body>
** 자바 스크립트 : client side script ** <br>
<script> // : javascript 주석
    window.document.write("환영합니다. JS세상"); // 브라우저 화면으로 출력
    console.log("개발자를 위해 표준 출력 장치로 출력"); // console에 출력
    document.write("<h2>브라우저에 문자열 출력</h2>");
</script>
다시 html로 나옴
<br>
<script>
    document.write("<h2>여기는 javascript</h2>");
    let a = 10;
    let b = a + 10;
    document.write("<br> b는 ", b);
</script>

let a = 10;
let b = a + 10;
document.write("<br> b는 ", b);

</body>
