<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    -- 변수 -- <br>
    <script type="text/javascript">  // type="text/javascript" 생략 가능
        // var aa;  // 변수 선언(전통적 방식) 요즘 사용 X
        let aa;  // 변수 선언(모던)    /* 여러 줄 주석*/
        aa = 100;
        let bb = 20.5;
        const cc = 300;  // 상수로 선언
        bb = bb + 10;
        // cc = cc + 10  Err cc 상수로 선언했기 때문에 수정 불가
        let dd = false;
        let msg = "변수 선언 이해"
        document.write(aa, " ", bb, " ", cc, " ", dd, " ", msg);
        document.write("<hr>");
        document.write("type 확인 :", typeof(1), " ", typeof(1.5)," ",
                        typeof("안녕"), " ", typeof(true), " ", typeof(null), " ",
                        typeof(undefined));
        // {} 영역 확보, 영역 안에 변수만 사용 가능 
        {
            let v1 = 1;     // 지역 변수   // var v1 = 1; 전역 변수
            document.write("<br>", v1);
            {
                let v2 = 2;
                document.write("<br>", v2);
                {
                    let v3 = 3
                    document.write("<br>", v3);
                    document.write("<br>", v1, " ", v2, " ", v3);
                }
            }
        }
        // 영역 밖에서 영역 안의 변수를 불러올 수 없음 
        // ERR document.write("<br>", v1, " ", v2, " ", v3);
        // Uncaught ReferenceError: v1 is not defined
    </script>
    <hr>
    -- 연산자 --<br>
    <script>
        let x = 5, y = 2;
        document.write("<br>", x, " ", y);
        document.write("<br>산술 연산 :", x + y, " ", x / y, " ", x % y, " ");  // 산술 연산
        document.write("<br>관계(비교) 연산 :", x > y, " ", x <= y, " ", x == y, " ", x != y);
        document.write("<br>논리 연산(&&-and, ||-or) :", x > y && x <= y, " ", x > y || x <= y);
        document.write("<br>누적 연산 :", x = x + 1, " ", ++x, " ", x += 1); // 셋다 같은 의미
        document.write("<br>삼항 연산 :", (x > y)?1000:1000+2000);  // 조건?참:거짓

        // 연산자 우선 순위 파이썬과 동일

        document.write("<br>");
        document.write("a" + "b" + "c");  // 문자열 더하기

        let m, b, c;
        m = b = c = 6 + 5  // 할당 연산 체이닝
        document.write("<br>", m, " ", b, " ", c)
    </script>
</body>
</html>
