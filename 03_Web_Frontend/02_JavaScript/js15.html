<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!--bootstrap 제공 css 사용 가능-->
    <!--CSS 먼저 작성 후 javascript 작성이 일반적-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
        window.onload = () => {
            document.querySelector("#btnSend").onclick = chkDataFunc;
            document.querySelector("#btnClear").onclick = clsDataFunc;
        }

        function chkDataFunc(event){
            // alert("a")
            event.preventDefault();  // submit 기능 해제

            // 아래 오류 검사 후 이상 없으면 서버로 자료 전송
            // 실무에서는 alert 사용 안함, CSS의 message box 사용
            // 이름검사
            if(frm.name.value === "" || isNaN(frm.name.value) === false){
                frm.name.focus();
                alert("이름을 입력하세요");
                return;
            }

            // 아이디 검사
            if(frm.id.value.length < 3){
                frm.id.focus();
                alert("id는 3글자 이상 입력하세요")
            }

            // 이메일 검사 abc@korea.com : 정규표현식 사용
            let str = "123Abc가나다45김 asdf1 23길동";
            console.log(str.match(/[1]/))
            console.log(str.match(/[1]/g))  // g : global
            console.log(str.match(/[0-9]/g))  // 숫자만
            console.log(str.match(/\d/g))  // 숫자만
            console.log(str.match(/[0-9 ]/g))  // 숫자, 공백만
            console.log(str.match(/[가나]/g))  // 한글 가, 나
            console.log(str.match(/[가-힣]/g))  // 한글만(한글자씩)(가, 나, 다, 길, 길, 동)
            console.log(str.match(/[가-힣]+/g))  // 한글만(가나다, 길, 길동)
            console.log(str.match(/[\d{2}+]/g))
            console.log(str.match(/[\d{2,3}+]/g)) 
            
            let email_regex = /^[0-9a-zA-Z]([-_.]?[0-9a-zA-Z])*@[0-9a-zA-Z]([-_.]?[0-9a-zA-Z])*\.[a-zA-Z]{2,3}$/i
            if(!frm.email.value.match(email_regex)){
                frm.email.focus();
                alert("email 형식에 맞게 입력하세요")
                return;
            }

            //나이 - 숫자 1 ~ 2 길이
            let age_regex = /^[0-9]{1,2}$/;   // 제일 앞글자 숫자, 숫자는 1 ~ 2 글자, 처음과 같은 글자로 끝나야함
            if(!frm.age.value.match(age_regex)){
                frm.age.focus();
                alert("나이는 숫자만 입력하세요")
                return;
            }
            
            // 입력 자료 
            frm.action = "my.py"
            frm.method = "get"
            frm.submit();
        }

        function clsDataFunc(){
            // alert("b")
            // frm.age.focus();
            document.querySelector("#name").focus()  // reset 기능 + focus 이동 
        }
    </script>
</head>
<body>
** 개인 자료 입력 **<br/>
<!-- <form action="서버파일명" name="frm"></form>
원칙이지만 현재 우리 서버는 적용 불가
-->
<form name="frm">
    <table class="table table-dark table-hover">
        <tr>
            <td>이 름</td>
            <td><input type="text" name="name" id="name" value="홍길동"></td>
        </tr>
        <tr>
            <td>아이디</td>
            <td><input type="text" name="id" id="id" placeholder="3글자 이상" value="kor"></td>
        </tr>
        <tr>
            <td>이메일</td>
            <td><input type="text" name="email" id="email" value="abc@abc.com"></td>
        </tr>
        <tr>
            <td>나이</td>
            <td><input type="text" name="age" id="age" ></td>
        </tr>
        <tr>
            <td colspan="2" style="text-align: center;">
                <input type="submit" id="btnSend" value="자료 전송" class="btn btn-primary">
                <input type="reset" id="btnClear" value="자료 삭제" class="btn btn-info">
            </td>
        </tr>
    </table>
</form>
</body>
</html>
