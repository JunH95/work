<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJAX 데이터 통신 기초</title>
    <script>
        // [1] 초기화 영역: HTML 태그들이 모두 브라우저에 로딩된 직후 실행됩니다.
        window.onload = () => {
            // 각 버튼을 찾아 클릭 이벤트(onclick)에 실행할 함수를 연결합니다.
            document.querySelector("#btn1").onclick = funcJson;
            document.querySelector("#btn2").onclick = funcCsv;
        }

        // [2] 전역 변수 선언
        // 서버와 통신을 담당할 '우체부' 역할을 하는 AJAX 통신 객체를 담을 공간입니다.
        let xhr;

        // ==========================================
        // [3] JSON 데이터 불러오기 함수
        // ==========================================
        function funcJson(){
            // Step 1: 통신 객체 생성 (새로운 우체부 고용)
            xhr = new XMLHttpRequest();

            // Step 2: 통신 준비 (목적지와 방식 설정)
            // GET 방식 / 목적지는 "sangpum.json" / true: 비동기(Asynchronous) 모드
            xhr.open("GET", "sangpum.json", true);
            
            // Step 3: 응답 대기 및 처리 로직 정의 (우체부가 돌아왔을 때 할 일)
            // 통신 상태(readyState)가 변할 때마다 이 함수가 자동으로 호출됩니다.
            xhr.onreadystatechange = function(){
                
                // 먼저, 통신이 완전히 끝났는지(readyState === 4) 확인합니다.
                if(xhr.readyState === 4){
                    
                    // 통신이 끝났다면, 서버의 응답 상태(status)가 정상(200)인지 확인합니다.
                    if(xhr.status === 200){
                        
                        // ---- 데이터 가공 시작 ----
                        // 서버가 보낸 순수 텍스트(responseText)를 자바스크립트가 다루기 쉬운 '객체(Object)'로 변환합니다.
                        let data = JSON.parse(xhr.responseText); 

                        let output = "JSON 반환결과<br>";
                        output += "코드&nbsp;&nbsp;&nbsp;품명<br>";
                        
                        // 변환된 데이터(배열)의 길이만큼 반복문을 돌며 필요한 값을 쏙쏙 뽑아냅니다.
                        for(let i=0; i < data.length; i++){
                            output += data[i].code + "&nbsp;&nbsp;&nbsp;" + data[i].sang + "<br>";
                        }
                        
                        // 조립이 끝난 결과물(HTML 문자열)을 화면의 #result 영역에 출력합니다.
                        document.querySelector("#result").innerHTML = output;
                        
                    } else {
                        // 통신은 끝났으나 파일이 없거나(404) 서버 에러(500)인 경우 실패 메시지 출력
                        document.querySelector("#result").innerHTML = "로딩 실패 : " + xhr.status;
                    }
                }
            }
            
            // Step 4: 실제 요청 보내기 (우체부 출발!)
            xhr.send();
        }

        // ==========================================
        // [4] CSV 데이터 불러오기 함수
        // ==========================================
        function funcCsv(){
            // Step 1: 통신 객체 생성
            xhr = new XMLHttpRequest();

            // Step 2: 통신 준비
            xhr.open("GET", "sangpum.csv", true);
            
            // Step 3: 응답 처리
            xhr.onreadystatechange = function(){
                // 통신이 완료되었고(4), 응답이 정상(200)일 때만 데이터 처리를 시작합니다.
                if(xhr.readyState === 4 && xhr.status === 200){
                    
                    // ---- 데이터 가공 시작 (CSV 파싱) ----
                    // 1. 받아온 전체 텍스트 양끝의 쓸데없는 공백이나 줄바꿈을 제거(trim)합니다.
                    let text = xhr.responseText.trim();
                    
                    // 2. 전체 텍스트를 줄바꿈("\n") 기준으로 쪼개어 배열(lines)로 만듭니다. (행 단위 분리)
                    let lines = text.split("\n");

                    let output = "CSV 반환결과<br>";

                    // 3. 쪼개진 행(lines)을 하나씩 꺼내어 반복합니다.
                    for(let i=0; i < lines.length; i++){
                        
                        if(lines[i] !== ""){ // 빈 줄이 아닐 경우에만 처리합니다.
                            
                            // 4. 해당 행을 콤마(",") 기준으로 다시 쪼갭니다. (열 단위 분리)
                            let parts = lines[i].split(",");
                            
                            // 5. 쪼개진 데이터 양옆의 찌꺼기 공백을 한 번 더 깔끔하게 제거합니다.
                            let code = parts[0].trim();
                            let sang = parts[1].trim();
                            
                            // 6. 화면에 띄울 문자열로 예쁘게 조립합니다.
                            output += "코드는 " + code + ", 상품명은 " + sang + "<br>";
                        }
                    }
                    // 가공 완료 후 화면 출력
                    document.querySelector("#result").innerHTML = output;
                }
            }
            
            // Step 4: 실제 요청 보내기 (이전 코드에서 누락되었던 가장 중요한 부분!)
            xhr.send();
        }
    </script>
</head>
<body>
    <h3>전통 AJAX 처리</h3>
    <button id="btn1">JSON 불러오기</button>
    <button id="btn2">CSV 불러오기</button>
    <hr>
    <div id="result"></div>
</body>
</html>
